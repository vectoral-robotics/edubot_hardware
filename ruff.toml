# EduBot Python lint + format config (ruff).
# Kept identical across edubot_hardware, edubot_demos, edubot_firmware.
line-length = 99
target-version = "py310"

[lint]
select = ["E", "F", "W", "I"]
# Line length is enforced by the formatter; E501 only flags long strings/
# comments the formatter intentionally leaves alone, so don't fail on it.
ignore = ["E501"]

[format]
quote-style = "double"
